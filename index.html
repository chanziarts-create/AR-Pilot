<!DOCTYPE html>
<html>
  <head>
    <title>Mike's AR Business Card</title>

    <!-- This one line loads the Google Model Viewer tool -->
    <script src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
  </head>

  <body>
    <!-- This tag displays your 3D model and adds an AR button -->
    <model-viewer
      src="your-avatar.glb"
      ar
      ar-modes="scene-viewer quick-look"
      camera-controls
      auto-rotate
      style="width: 100%; height: 100vh;">
    </model-viewer>

  </body>
</html>
